# vim:ft=kitty

## Name: Black-Lilac-Gold Theme
## Inspired by custom Waybar style

font_family Hack Nerd Font Mono

foreground                      #e6d9ff
background                      #0e0f11
background_opacity              0.85
selection_foreground            #0e0f11
selection_background            #ffcc33

cursor                          #ffcc33
cursor_text_color               #0e0f11
cursor_shape beam

url_color                       #6a0dad

active_border_color             #ffcc33
inactive_border_color           #6a0dad
bell_border_color               #ffcc33
visual_bell_color               none

wayland_titlebar_color          system
macos_titlebar_color            system

active_tab_background           #6a0dad
active_tab_foreground           #ffffff
inactive_tab_background         #1a1b1f
inactive_tab_foreground         #a88fbb
tab_bar_background              #0e0f11
tab_bar_margin_color            none

mark1_foreground                #0e0f11
mark1_background                #ffcc33
mark2_foreground                #0e0f11
mark2_background                #6a0dad
mark3_foreground                #0e0f11
mark3_background                #caa6ff

#: black
color0                          #0e0f11
color8                          #1a1b1f

#: red (deep magenta-red for errors)
color1                          #b30f5a
color9                          #ff4d94

#: green (using gold as "green" for theme harmony)
color2                          #ffcc33
color10                         #ffd966

#: yellow (soft gold highlight)
color3                          #ffb733
color11                         #ffcc66

#: blue (violet-blue blend)
color4                          #6a0dad
color12                         #a64dff

#: magenta (bright lilac)
color5                          #caa6ff
color13                         #e6d9ff

#: cyan (lavender-blue tone)
color6                          #9f8cff
color14                         #bfa6ff

#: white (soft gray-lilac)
color7                          #d4cce6
color15                         #ffffff

shell /bin/bash

disable_multiline_input yes
enable_keypad no
strip_trailing_spaces never
