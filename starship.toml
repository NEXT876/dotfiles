# Starship Konfiguration für einen lila-schwarz-weißen Prompt mit Gold-Akzenten

# Allgemeine Einstellungen
add_newline = true
command_timeout = 500
scan_timeout = 30

# Prompt Format
format = """
[╭─](bold white)[ $username@$hostname ](bg:#6b21a8 fg:white)[](fg:#6b21a8 bg:black)[ $directory ](fg:white bg:black)[](fg:black bg:#d4af37)[ $git_branch$git_status ](fg:black bg:#d4af37)[](fg:#d4af37)
[╰─➤ ](bold #6b21a8)$character"""

# Benutzername
[username]
style_user = "fg:white bg:#6b21a8"
style_root = "fg:white bg:#6b21a8"
format = "[$user]($style)"
show_always = true

# Hostname
[hostname]
ssh_only = false
style = "fg:white bg:#6b21a8"
format = "[$hostname]($style)"

# Verzeichnis
[directory]
style = "fg:white bg:black"
format = "[$path]($style)"
truncation_length = 3
truncation_symbol = "…/"

# Git Branch
[git_branch]
style = "fg:black bg:#d4af37"
format = "[$symbol$branch]($style)"

# Git Status
[git_status]
style = "fg:black bg:#d4af37"
format = "[$all_status$ahead_behind]($style)"

# Zeichen (Prompt-Symbol)
[character]
success_symbol = "[❯](bold #6b21a8)"
error_symbol = "[❯](bold red)"
vicmd_symbol = "[❮](bold #6b21a8)"

# Zeit
[time]
disabled = false
style = "fg:white bg:black"
format = "[ $time ]($style)"
time_format = "%R"

# Batterie
[battery]
full_symbol = "🔋"
charging_symbol = "⚡️"
discharging_symbol = "🔌"
format = "[$symbol$percentage]($style) "
[[battery.display]]
threshold = 10
style = "fg:white bg:black"
[[battery.display]]
threshold = 50
style = "fg:white bg:black"

# Node.js
[nodejs]
style = "fg:white bg:black"
format = "[ $symbol($version) ]($style)"

# Python
[python]
style = "fg:white bg:black"
format = "[ $symbol($version) ]($style)"

# Rust
[rust]
style = "fg:white bg:black"
format = "[ $symbol($version) ]($style)"

# Paketversion
[package]
style = "fg:white bg:black"
format = "[ $symbol($version) ]($style)"